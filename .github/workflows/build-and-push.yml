name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'airflow/**'
      - 'api/**'
      - 'streamlit_app/**'
      - 'mlflow/**'
      - 'locust/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Airflow image
        uses: docker/build-push-action@v5
        with:
          context: ./airflow
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            jchapadockerhub/mlops-pf-airflow:latest
            jchapadockerhub/mlops-pf-airflow:${{ github.sha }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            jchapadockerhub/mlops-pf-api:latest
            jchapadockerhub/mlops-pf-api:${{ github.sha }}

      - name: Build and push Streamlit image
        uses: docker/build-push-action@v5
        with:
          context: ./streamlit_app
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            jchapadockerhub/mlops-pf-streamlit:latest
            jchapadockerhub/mlops-pf-streamlit:${{ github.sha }}

      - name: Build and push MLflow image
        uses: docker/build-push-action@v5
        with:
          context: ./mlflow
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            jchapadockerhub/mlops-pf-mlflow:latest
            jchapadockerhub/mlops-pf-mlflow:${{ github.sha }}

      - name: Build and push Locust image
        uses: docker/build-push-action@v5
        with:
          context: ./locust
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            jchapadockerhub/mlops-pf-locust:latest
            jchapadockerhub/mlops-pf-locust:${{ github.sha }}