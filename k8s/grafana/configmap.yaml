apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: mlops-pf
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: mlops-pf
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: MLOps
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-mlops
  namespace: mlops-pf
data:
  mlops-dashboard.json: |
    {
      "title": "MLOps PF API Dashboard",
      "uid": "mlops-pf-api-dashboard",
      "version": 1,
      "schemaVersion": 36,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "title": "Total de Solicitudes HTTP",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(http_requests_total)",
              "legendFormat": "Total Requests"
            }
          ]
        },
        {
          "id": 2,
          "title": "Solicitudes por Segundo (RPS)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[1m]))",
              "legendFormat": "RPS"
            }
          ]
        },
        {
          "id": 3,
          "title": "Tasa de Error",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status_code=~\"5..\"}[1m])) / sum(rate(http_requests_total[1m])) * 100 or vector(0)",
              "legendFormat": "Error Rate %"
            }
          ]
        },
        {
          "id": 4,
          "title": "Latencia Promedio (ms)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_sum[1m])) / sum(rate(http_request_duration_seconds_count[1m])) * 1000",
              "legendFormat": "Avg Latency ms"
            }
          ]
        },
        {
          "id": 5,
          "title": "Solicitudes HTTP por Endpoint",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum by (handler) (rate(http_requests_total[1m]))",
              "legendFormat": "{{handler}}"
            }
          ]
        },
        {
          "id": 6,
          "title": "Latencia por Percentiles",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket[1m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[1m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[1m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "id": 7,
          "title": "Solicitudes por Status Code",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "sum by (status_code) (rate(http_requests_total[1m]))",
              "legendFormat": "HTTP {{status_code}}"
            }
          ]
        },
        {
          "id": 8,
          "title": "Total Requests Procesadas",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "sum(http_request_duration_seconds_count) or vector(0)",
              "legendFormat": "In Progress"
            }
          ]
        }
      ],
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {}
    }