apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-init
  namespace: mlops-pf
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Esperando PostgreSQL...";
                sleep 5;
              done
      containers:
        - name: airflow-init
          image: jchapadockerhub/mlops-pf-airflow:latest
          env:
            - name: AIRFLOW_DB_USER
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: airflow-db-user
            - name: AIRFLOW_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: airflow-db-password
            - name: AIRFLOW_DB
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: airflow-db
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: postgresql+psycopg2://$(AIRFLOW_DB_USER):$(AIRFLOW_DB_PASSWORD)@postgres:5432/$(AIRFLOW_DB)
            - name: AIRFLOW__CORE__EXECUTOR
              valueFrom:
                configMapKeyRef:
                  name: airflow-config
                  key: AIRFLOW__CORE__EXECUTOR
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              valueFrom:
                configMapKeyRef:
                  name: airflow-config
                  key: AIRFLOW__CORE__LOAD_EXAMPLES
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: airflow-secret-key
            - name: AIRFLOW_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: airflow-admin-user
            - name: AIRFLOW_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: airflow-admin-password
            - name: AIRFLOW_ADMIN_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: airflow-config
                  key: AIRFLOW_ADMIN_EMAIL
          command:
            - bash
            - -c
            - |
              airflow db migrate &&
              airflow users create \
                --username $AIRFLOW_ADMIN_USER \
                --password $AIRFLOW_ADMIN_PASSWORD \
                --firstname Admin \
                --lastname User \
                --role Admin \
                --email $AIRFLOW_ADMIN_EMAIL || true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"